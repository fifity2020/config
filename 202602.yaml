# 1. 基础设置
mixed-port: 7890
allow-lan: true
ipv6: true
log-level: info
unified-delay: true
tcp-concurrent: true

# 2. 嗅探设置 (增强分流准确度，IPV6不开)
#sniffer:
 # enable: true
 # sniff:
 #  TLS: {ports: [443, 8443]}
 #  HTTP: {ports: [80, 8080-8880]}

# 3. DNS 加速 (采用了机场服务商DNS)
dns:
  enable: true
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-range6: fc00::/18 # 针对IPv6 环境
  respect-rules: true
   proxy-server-nameserver: 
   - udp://query.xiaohu.buzz:55553
   - udp://146.190.131.173:55553
   - udp://query.huyun-query.com:55553
   - tcp://query.huyun-query.com:55553
   - udp://151.242.165.22:1053
   - tcp://151.242.165.22:55553
   - tcp://146.190.131.173:55553
   - tcp://192.155.81.6:1053
   - 223.5.5.5
   - 211.138.13.66
     
  # 💡 使用运营商 DNS 
  nameserver: 
   - udp://query.xiaohu.buzz:55553
   - udp://146.190.131.173:55553
   - udp://query.huyun-query.com:55553
   - tcp://query.huyun-query.com:55553
   - udp://151.242.165.22:1053
   - tcp://151.242.165.22:55553
   - tcp://146.190.131.173:55553
   - tcp://192.155.81.6:1053
   
  # 💡 国外走机场加速 DNS 和 Google，防止 DNS 泄露
  fallback: [ 'https://dns.google/dns-query','https://1.1.1.1/dns-query']
  fallback-filter: {geoip: true, geoip-code: CN}
  # 💡 解决插件检测异常：让流媒体域名不进入 Fake-IP 模式
  fake-ip-filter: ['+.netflix.com', '+.netflix.net', '+.nflxvideo.net', '+.disneyplus.com', '+.googlevideo.com', '+.youtube.com', 'msftconnecttest.com', 'msftncsi.com', 'cpas.google', 'connectivitycheck.gstatic.com']
  # 💡 咪咕方案
  hosts:
    'studentlive.migucloud.com' : '39.134.142.147'    

# 4. 机场订阅
proxy-providers:
  Airport1:
    url: "我的订阅" 
    type: http
    interval: 7200
    path: ./proxies/airport1.yaml
    health-check: {enable: true, url: "http://www.gstatic.com/generate_204", interval: 600}

# 4. 远程规则集 (只挑选最稳的 4 个)
# 💡 定义锚点模板
rule-anchor:
  ip: &ip {type: http, interval: 86400, behavior: ipcidr, format: mrs}
  domain: &domain {type: http, interval: 86400, behavior: domain, format: mrs}
  class: &class {type: http, interval: 86400, behavior: classical, format: text}
# 💡 规则组
