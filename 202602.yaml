# 1. 基础设置
mixed-port: 7890
allow-lan: true
ipv6: true
log-level: info
unified-delay: true
tcp-concurrent: true

# 2. 嗅探设置 
sniffer:
  enable: true
  parse-pure-ip: true # 💡 如果是纯 IP 请求，尝试还原域名以匹配规则
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
      # override-destination: true # 💡 家庭使用建议不强制覆盖 TLS 目标，增加稳定性
    QUIC: # 💡 IPv6 环境下，很多大厂（YouTube, 字节）走 QUIC，建议加上
      ports: [443, 8443]
  
  skip-domain:
    - 'Mijia Cloud' # 排除米家
    - '+.apple.com' # 苹果服务嗅探易断连
    - 'dlg.io.mi.com'
    - '+.baidu.com'
    - '+.qq.com'
    - '+.taobao.com'
    - '+.jd.com'
    - '+.tmall.com'
    - 'rule-set:cn_domain' # 💡 终极建议：直接排除你所有的国内直连域名集
# 3. 入站 
tun:
  enable: true
  stack: mixed
  auto-route: false # 保持现状，由 Nikki 维护
  strict-route: true
# 4. DNS 加速 (采用了机场服务商DNS)
dns:
  enable: true
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-range6: fc00::/18 # 针对IPv6 环境
  respect-rules: true
   proxy-server-nameserver: 
   - udp://query.xiaohu.buzz:55553
   - udp://146.190.131.173:55553
   - udp://query.huyun-query.com:55553
   - tcp://query.huyun-query.com:55553
   - udp://151.242.165.22:1053
   - tcp://151.242.165.22:55553
   - tcp://146.190.131.173:55553
   - tcp://192.155.81.6:1053
   - 223.5.5.5
   - 211.138.13.66
     
  # 💡 国内直连解析：使用加密 DoH，防止运营商劫持 
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
   
  # 💡 国外/兜底解析：只在规则匹配到代理或解析无结果时触发
  fallback:
    - https://8.8.8.8/dns-query#RULES&ecs=223.5.5.0/24
    - https://1.1.1.1/dns-query#RULES
    - https://dns.google/dns-query#RULES
  # 智能判别：如果 nameserver 返回的是国外 IP，则强制改用 fallback 的结果
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4
   # 💡 解决插件检测异常：让流媒体域名不进入 Fake-IP 模式
  fake-ip-filter:
    # 基础服务
    - 'ntp*.aliyun.com'
    - 'unify.ui.com'
    - '+.msftconnecttest.com'
    - '+.msftncsi.com'
    # 流媒体（解决你的第二种配置中的需求）
    - '+.netflix.com'
    - '+.netflix.net'
    - '+.nflxvideo.net'
    - '+.disneyplus.com'
    - '+.googlevideo.com'
    - '+.youtube.com'
    # 常用组件
    - 'rule-set:fakeipfilter_domain' # 如果你用了外部规则集
  # 💡 咪咕方案
  hosts:
    'studentlive.migucloud.com' : '39.134.142.147'    

# 5. 机场订阅
proxy-providers:
  Airport1:
    url: "我的订阅" 
    type: http
    interval: 7200
    path: ./proxies/airport1.yaml
    health-check: {enable: true, url: "http://www.gstatic.com/generate_204", interval: 600}

# 6. 远程规则集 (只挑选最稳的 4 个)
# 💡 定义锚点模板
rule-anchor:
  ip: &ip {type: http, interval: 86400, behavior: ipcidr, format: mrs}
  domain: &domain {type: http, interval: 86400, behavior: domain, format: mrs}
  class: &class {type: http, interval: 86400, behavior: classical, format: text}
