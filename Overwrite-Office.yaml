# Mihomo Party 专用覆写办公版

# 全局配置 
# 1. 基础设置
allow-lan: false
log-level: info
ipv6: false
unified-delay: true
# 2. 连接优化
tcp-concurrent: true
global-client-fingerprint: chrome
# 3. 连接保活
keep-alive-idle: 3600    # 闲置连接保留时间 (秒)
keep-alive-interval: 30  # 心跳包探测间隔 (秒)
# 4. 外部资源优化 (GeoData 模式)
# 开启这个可以大幅减少初次匹配时的内存占用
geodata-mode: true
geox-url:
  geoip: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.dat"
  geosite: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat"
  mmdb: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country.mmdb"
# 5. 存储设置
profile:
  store-selected: true    # 记住你选过的节点
  store-fake-ip: true     # 记住 Fake-IP 映射

# 入站 
tun:
  enable: true
  # system/gvisor/mixed
  stack: mixed
  dns-hijack: ["any:53", "tcp://any:53"]
  # 自动设置路由，将全局流量导入到 TUN 网卡
  auto-route: true


dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  respect-rules: false
  fake-ip-filter:
    - '+.lan'
    - '+.local'
    - '+.internal'
    - 'oa.corp.com'
    - '*.msftncsi.com'
    - 'msftconnecttest.com'
    - '+.stun.*'
  default-nameserver:
    - system
    - 223.5.5.5
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  nameserver-policy:
    'geosite:private,cn': [223.5.5.5, 119.29.29.29]
    'oa.corp.com': system
    '+.corp.com': system
    '+.internal': system
    '*.msftncsi.com': system
    '*.msftconnecttest.com': system

sniffer:
  enable: true
  parse-pure-ip: true
  sniff:
    HTTP: { ports: [80, 8080-8880], override-destination: true }
    TLS: { ports: [443, 8443] }
    QUIC: { ports: [443, 8443] }
  skip-domain:
    - 'Mijia Cloud'
    - '+.push.apple.com'

rule-providers:
  reject_domain: { type: http, interval: 86400, behavior: domain, format: mrs, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/category-ads-all.mrs"}
  ai_domain: { type: http, interval: 86400, behavior: domain, format: mrs, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/category-ai-!cn.mrs" }
  youtube_domain: { type: http, interval: 86400, behavior: domain, format: mrs, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/youtube.mrs"}
  google_domain: { type: http, interval: 86400, behavior: domain, format: mrs, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/google.mrs"}
  github_domain: { type: http, interval: 86400, behavior: domain, format: mrs, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/github.mrs"}
  telegram_domain: { type: http, interval: 86400, behavior: domain, format: mrs, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/telegram.mrs"}
  netflix_domain: { type: http, interval: 86400, behavior: domain, format: mrs, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/netflix.mrs"}
  microsoft_domain: { type: http, interval: 86400, behavior: domain, format: mrs, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/microsoft.mrs"}
  apple_domain: { type: http, interval: 86400, behavior: domain, format: mrs, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/apple.mrs"}
  feishu_domain: { type: http, interval: 86400, behavior: domain, format: mrs, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/feishu.mrs" }
  slack_domain: { type: http, interval: 86400, behavior: domain, format: mrs, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/slack.mrs" }
  zoom_domain: { type: http, interval: 86400, behavior: domain, format: mrs, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/zoom.mrs" }
  cn_domain: { type: http, interval: 86400, behavior: domain, format: mrs, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/cn.mrs"}
  cn_ip: { type: http, interval: 86400, behavior: ipcidr, format: mrs, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/cn.mrs"}
  telegram_ip: { type: http, interval: 86400, behavior: ipcidr, format: mrs, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/telegram.mrs"}
  geolocation-!cn: { type: http, interval: 86400, behavior: domain, format: mrs, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/geolocation-!cn.mrs"}

proxy-groups:
  - { name: 🚀 主代理组, type: select, proxies: [⚡ 全局自动优选, 🇭🇰 香港节点, 🇸🇬 狮城节点, 🇯🇵 日本节点, 🇺🇲 美国节点, DIRECT] }
  - { name: ⚡ 全局自动优选, type: url-test, include-all: true, filter: "^(?!.*(剩余|到期|官网|过期|Traffic|Website|Reset)).*", url: "http://www.gstatic.com/generate_204", interval: 300, tolerance: 50}
  - { name: 🇭🇰 香港节点, type: url-test, include-all: true, filter: "(?i)HK|香港|HongKong", interval: 300, tolerance: 50, lazy: true}
  - { name: 🇯🇵 日本节点, type: url-test, include-all: true, filter: "(?i)JP|日本|Japan", interval: 300, tolerance: 50, lazy: true}
  - { name: 🇸🇬 狮城节点, type: url-test, include-all: true, filter: "(?i)SG|新加坡|Singapore", interval: 300, tolerance: 50, lazy: true}
  - { name: 🇺🇲 美国节点, type: url-test, include-all: true, filter: "(?i)US|美国|United States", interval: 300, tolerance: 50, lazy: true}
  - { name: 🤖 AI, type: select, proxies: [🇺🇲 美国节点, 🇯🇵 日本节点, 🇸🇬 狮城节点, 🚀 主代理组] }
  - { name: 💼 办公协作, type: select, proxies: [DIRECT, 🇭🇰 香港节点, 🇸🇬 狮城节点, 🚀 主代理组] }
  - { name: 🕊️ 飞书/Lark, type: select, proxies: [DIRECT, 🚀 主代理组] }
  - { name: 📺 YouTube, type: select, proxies: [🚀 主代理组, ⚡ 全局自动优选] }
  - { name: 🎥 NETFLIX, type: select, proxies: [🇸🇬 狮城节点, 🇭🇰 香港节点, 🚀 主代理组] }
  - { name: 📲 Telegram, type: select, proxies: [🚀 主代理组, ⚡ 全局自动优选] }
  - { name: 🍎 Apple, type: select, proxies: [DIRECT, 🚀 主代理组] }
  - { name: 🪟 Microsoft, type: select, proxies: [DIRECT, 🚀 主代理组] }
  - { name: Google, type: select, proxies: [🚀 主代理组, 🇭🇰 香港节点, 🇯🇵 日本节点] }
  - { name: 广告拦截, type: select, proxies: [REJECT, DIRECT] }
  - { name: 🐟 漏网之鱼, type: select, proxies: [🚀 主代理组, DIRECT] }

rules:
  - GEOIP,LAN,DIRECT,no-resolve
  - RULE-SET,reject_domain,广告拦截
  - AND,((NETWORK,UDP),(DST-PORT,443),(DOMAIN-KEYWORD,googlevideo)),REJECT
  - RULE-SET,feishu_domain,🕊️ 飞书/Lark
  - RULE-SET,zoom_domain,💼 办公协作
  - RULE-SET,slack_domain,💼 办公协作
  - RULE-SET,ai_domain,🤖 AI
  - RULE-SET,youtube_domain,📺 YouTube
  - RULE-SET,netflix_domain,🎥 NETFLIX
  - RULE-SET,telegram_domain,📲 Telegram
  - RULE-SET,telegram_ip,📲 Telegram
  - RULE-SET,google_domain,Google
  - RULE-SET,github_domain,🚀 主代理组
  - RULE-SET,apple_domain,🍎 Apple
  - RULE-SET,microsoft_domain,🪟 Microsoft
  - RULE-SET,cn_domain,DIRECT
  - RULE-SET,cn_ip,DIRECT,no-resolve
  - GEOIP,CN,DIRECT,no-resolve
  - RULE-SET,geolocation-!cn,🚀 主代理组
  - MATCH, 🐟 漏网之鱼
