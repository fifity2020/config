  - { name: 🍎 Apple, type: select, proxies: [DIRECT, 🚀 主代理组] }
  - { name: 🪟 Microsoft, type: select, proxies: [DIRECT, 🚀 主代理组] }
  - { name: 🚫 广告拦截, type: select, proxies: [REJECT, DIRECT] }
  - { name: 🐟 漏网之鱼, type: select, proxies: [🚀 主代理组, DIRECT] }

# 6. 规则
rules:
  - GEOIP,LAN,DIRECT,no-resolve
  - RULE-SET,reject_domain,🚫 广告拦截


# YouTube 特殊处理 (UDP/QUIC 降级)
  - AND,((NETWORK,UDP),(DST-PORT,443),(DOMAIN-KEYWORD,googlevideo)),REJECT
  
#   家庭应用分流
  - RULE-SET,ai_domain,🤖 AI
  - RULE-SET,youtube_domain,📺 国际流媒体
  - RULE-SET,netflix_domain,📺 国际流媒体
  - RULE-SET,telegram_domain,🚀 主代理组
  - RULE-SET,google_domain,🚀 主代理组
  - RULE-SET,github_domain,🚀 主代理组
  
# 系统与游戏
  - RULE-SET,apple_domain,🍎 Apple
  - RULE-SET,microsoft_domain,🪟 Microsoft
  - GEOSITE,category-games,🎮 游戏平台
  
# 国内直连
  - RULE-SET,cn_domain,DIRECT
  - RULE-SET,cn_ip,DIRECT,no-resolve
  - GEOIP,CN,DIRECT,no-resolve

# 兜底
  - RULE-SET,geolocation-!cn,🚀 主代理组
  - MATCH, 🐟 漏网之鱼
